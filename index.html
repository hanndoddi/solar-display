<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mentaskólinn Solar Display</title>
  <style>
    body { background: #ffffff; font-family: sans-serif; max-width: 800px; margin: 3rem auto; padding: 1rem; text-align: center; color: #222; }
    h1 { color: #e67e22; }
    p { color: #555; }
    .power { font-size: 4rem; font-weight: bold; color: #2ecc71; margin: 1rem 0; }
    .unit  { font-size: 1.5rem; color: #888; }
    .time  { font-size: 0.85rem; color: #aaa; margin-top: 1rem; }
    .kwh-display { font-size: 1.8rem; font-weight: bold; color: #e67e22; margin: 0.5rem 0; }
    .kwh-label { font-size: 0.85rem; color: #aaa; margin-bottom: 1rem; }
    .chart-section { margin-top: 2rem; }
    .chart-section h2 { color: #555; font-size: 1rem; margin-bottom: 0.5rem; }
    #peak { color: #888; font-size: 0.9rem; margin: 0.5rem 0; }
    table {
      margin: 1rem auto;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 6px 10px;
      border: 1px solid #ddd;
      text-align: center;
      color: #222;
    }
    th {
      background: #f4f4f4;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background: #fafafa;
    }
  </style>
</head>
<body>
  <h1>☀️ Menntasólin á Ísafirði</h1>
  <p>Núverandi orka</p>
  <div class="power" id="power">--</div>
  <div class="unit">vatt (W)</div>
  <div class="time" id="time">næ í...</div>

  <div class="kwh-display" id="kwh-today">-- kWh</div>
  <div class="kwh-label">Orka í dag</div>

  <div id="peak">Top gildi: - W</div>
  <div id="logTable"></div>

  <div class="chart-section">
    <h2>Skráð gögn (5 mín. sýnishorn)</h2>
    <canvas id="solarChart" width="800" height="400"></canvas>
  </div>

  <div class="chart-section">
    <h2>Dagur í heild virkir tímar (15 mín.)</h2>
    <canvas id="solarChartDay" width="800" height="400"></canvas>
    <h2 style="margin-top:1.5rem">Dagur í heild(24 klst)</h2>
    <canvas id="solarChartDay24" width="800" height="400"></canvas>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/displog.js"></script>
  <script src="js/solarlog.js"></script>

  <script>
    function load() {
      fetch('https://solar-proxy.hanndoddi.workers.dev/today?public=true')
        .then(r => r.json())
        .then(d => {
          document.getElementById('power').textContent = d.latest_power.value;
          document.getElementById('time').textContent = 'Updated: ' + new Date(d.latest_power.time * 1000).toLocaleString();
        })
        .catch(() => {
          document.getElementById('power').textContent = '--';
          document.getElementById('time').textContent = 'Could not load data';
        });
    }

    function loadStats() {
      fetch('https://solar-proxy.hanndoddi.workers.dev/today-stats?public=true')
        .then(r => r.json())
        .then(d => {
          const totalWh = d.stats?.[0]?.totals?.production ?? null;
          document.getElementById('kwh-today').textContent =
            totalWh !== null ? (totalWh / 1000).toFixed(2) + ' kWh' : '-- kWh';

          const production = d.stats?.[0]?.production ?? [];
          const startTime  = d.stats?.[0]?.start_time ?? 0;
          const interval   = d.stats?.[0]?.interval_length ?? 900;
          renderDayChart(production, startTime, interval);
        })
        .catch(() => {
          document.getElementById('kwh-today').textContent = '-- kWh';
          console.error('loadStats failed');
        });
    }

    load();
    loadStats();
    setInterval(load, 60000);
    setInterval(loadStats, 300000);
  </script>
</body>
</html>
