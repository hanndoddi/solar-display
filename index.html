<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mentaskólinn Solar Display</title>
  <style>
    body { background: #375e71ff; font-family: sans-serif; max-width: 800px; margin: 3rem auto; padding: 1rem; text-align: center; }
    h1 { color: #e67e22; }
    .power { font-size: 4rem; font-weight: bold; color: #2ecc71; margin: 1rem 0; }
    .unit  { font-size: 1.5rem; color: #d1d1d4; }
    .time  { font-size: 0.85rem; color: #d1d2d7ff; margin-top: 1rem; }
    table {
  margin: 1rem auto;
  border-collapse: collapse;
  font-size: 0.9rem;
}

th, td {
  padding: 6px 10px;
  border: 1px solid #ccc;
  text-align: center;
}

th {
  background: #f4f4f4;
  font-weight: bold;
}

tr:nth-child(even) {
  background: #fafafa;
}
  </style>
</head>
<body>
  <h1>☀️ Menntasólin á Ísafirði</h1>
  <p>Núverandi orka</p>
  <div class="power" id="power">--</div>
  <div class="unit">vatt(W)</div>
  <div class="time" id="time">næ í...</div>
    <div id="peak">Top gildi: - W</div>
  <div id="logTable"></div>
  <script src="js/solarlog.js"></script>
  <script src="js/displog.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<canvas id="solarChart" width="800" height="400"></canvas>
<script>
    function load() {
      fetch('https://solar-proxy.hanndoddi.workers.dev/today?public=true')
        .then(r => r.json())
        .then(d => {
          document.getElementById('power').textContent = d.latest_power.value;
          document.getElementById('time').textContent = 'Updated: ' + new Date(d.latest_power.time * 1000).toLocaleString();
        })
        .catch(() => {
          document.getElementById('power').textContent = '--';
          document.getElementById('time').textContent = 'Could not load data';
        });
    }
    load();
    setInterval(load, 60000); // refresh every minute
  </script>
</body>
</html>
