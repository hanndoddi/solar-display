<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mentaskólinn Solar Display</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
    h1   { color: #e67e22; }
    .cards { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-top: 1.5rem; }
    .card  { background: #f8f8f8; border-radius: 12px; padding: 1.2rem; text-align: center; }
    .card .value { font-size: 2rem; font-weight: bold; color: #2ecc71; }
    .card .label { color: #666; font-size: 0.85rem; margin-top: 0.3rem; }
    .status { margin-top: 1rem; font-size: 0.8rem; color: #999; }
    .dot    { display: inline-block; width: 8px; height: 8px;
              background: #2ecc71; border-radius: 50%; margin-right: 4px; }
  </style>
</head>
<body>

  <h1>☀️ Mentaskólinn Solar</h1>
  <p>Live solar production — Ísafjörður</p>

  <div class="cards">
    <div class="card">
      <div class="value" id="current">--</div>
      <div class="label">Current output (kW)</div>
    </div>
    <div class="card">
      <div class="value" id="today">--</div>
      <div class="label">Produced today (kWh)</div>
    </div>
    <div class="card">
      <div class="value" id="lifetime">--</div>
      <div class="label">Lifetime total (MWh)</div>
    </div>
    <div class="card">
      <div class="value" id="size">--</div>
      <div class="label">System size (kW)</div>
    </div>
  </div>

  <p class="status">
    <span class="dot"></span>
    Data updated: <span id="updated">loading...</span>
  </p>

  <script>
    fetch('data.json?t=' + Date.now())
      .then(r => r.json())
      .then(d => {
        document.getElementById('current').textContent  = (d.current_power_w / 1000).toFixed(2);
        document.getElementById('today').textContent    = (d.energy_today_wh / 1000).toFixed(1);
        document.getElementById('lifetime').textContent = (d.energy_lifetime_wh / 1000000).toFixed(2);
        document.getElementById('size').textContent     = (d.system_size_w / 1000).toFixed(1);
        document.getElementById('updated').textContent  = new Date(d.updated_at).toLocaleString();
      });
  </script>

</body>
</html>
