<!DOCTYPE html>
<html lang="is">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Mentaskólinn Solar Display</title>
  <style>
    body { background: #FFFFFF; font-family: sans-serif; max-width: 800px; margin: 3rem auto; padding: 1rem; text-align: center; }
    h1 { color: #e67e22; }
    .power { font-size: 4rem; font-weight: bold; color: #2ecc71; margin: 1rem 0; }
    .unit  { font-size: 1.5rem; color: #87878fff; }
    .time  { font-size: 0.85rem; color: #858795ff; margin-top: 1rem; }
    table {
      margin: 1rem auto;
      border-collapse: collapse;
      font-size: 0.9rem;
    }
    th, td {
      padding: 6px 10px;
      border: 1px solid #4a7a8a;
      text-align: center;
      color: #000;
    }
    th {
      background: #78acc3ff;
      font-weight: bold;
    }
    tr:nth-child(even) {
      background: #a0c4d4ff;
    }
  </style>
</head>
<body>
  <h1>☀️ Menntasólin á Ísafirði</h1>
  <p>Núverandi orka</p>
  <div class="power" id="power">--</div>
  <div class="unit">vatt (W)</div>
  <div class="time" id="time">næ í...</div>
  <div id="peak">Top gildi: - W</div>
  <canvas id="solarChart" width="800" height="400"></canvas>
  <div id="logTable"></div>

  <!-- 1. Chart.js first, so displog.js can use it -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <!-- 2. displog.js defines renderLogTable / renderChart -->
  <script src="js/displog.js"></script>
  <!-- 3. solarlog.js calls those functions, so it goes last -->
  <script src="js/solarlog.js"></script>
</body>
</html>
